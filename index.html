<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIM TRAINER</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PAGE TITLE -->
  <h1>AIM TRAINER</h1>
  <p class="subtitle">// precision target system </p>

  <!-- ══ MENU ══ -->
  <div id="menu-card" class="panel">
    <div id="menu">
      <p class="menu-hint">// select difficulty</p>
      <div class="diff-row">
        <button class="diff-btn" onclick="pick('easy',this)">Easy</button>
        <button class="diff-btn" onclick="pick('medium',this)">Medium</button>
        <button class="diff-btn" onclick="pick('hard',this)">Hard</button>
      </div>
      <button id="start-btn" onclick="startGame()">Select Difficulty</button>
    </div>
  </div>

  <!-- ══ STATS BAR ══ -->
  <div id="stats-bar">
    <div class="stat-cell">
      <span class="stat-lbl">Score</span>
      <span class="stat-val" id="s-score">0</span>
    </div>
    <div class="stat-cell">
      <span class="stat-lbl">Streak</span>
      <span class="stat-val" id="s-streak">0</span>
    </div>
    <div class="stat-cell">
      <span class="stat-lbl">Accuracy</span>
      <span class="stat-val" id="s-acc">--%</span>
    </div>
    <div class="stat-cell">
      <span class="stat-lbl">Time</span>
      <span class="stat-val" id="s-time">30</span>
    </div>
  </div>

  <!-- ══ STREAK BAR ══ -->
  <div id="streak-row">
    <span>2x streak</span>
    <div id="streak-track">
      <div id="streak-fill"></div>
    </div>
    <span id="streak-count">0/5</span>
  </div>

  <!-- ══ GAME AREA ══ -->
  <div id="game-area" onclick="onMiss(event)">
  </div>

  <!-- ══ RESET ══ -->
  <button id="reset-btn" onclick="reset()">⬛ End Round</button>

  <!-- ══ RESULTS ══ -->
  <div id="results" class="panel">
    <h2>// round complete</h2>
    <div id="grade">B</div>
    <div id="feedback"></div>
    <div class="res-grid">
      <div class="res-box"><span class="val" id="r-score">0</span><span class="lbl">Score</span></div>
      <div class="res-box"><span class="val" id="r-hits">0</span><span class="lbl">Hits</span></div>
      <div class="res-box"><span class="val" id="r-miss">0</span><span class="lbl">Misses</span></div>
      <div class="res-box"><span class="val" id="r-acc">0%</span><span class="lbl">Accuracy</span></div>
      <div class="res-box"><span class="val" id="r-streak">0</span><span class="lbl">Best Streak</span></div>
      <div class="res-box"><span class="val" id="r-doubles">0</span><span class="lbl">2x Events</span></div>
    </div>
    <div class="res-btns">
      <button class="pri" onclick="startGame()">Play Again</button>
      <button onclick="goMenu()">Menu</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
